apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: amif-backend-hpa
  namespace: amif-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: amif-backend
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
