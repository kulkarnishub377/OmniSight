apiVersion: apps/v1
kind: Deployment
metadata:
  name: amif-backend
  namespace: amif-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: amif-backend
  template:
    metadata:
      labels:
        app: amif-backend
    spec:
      containers:
        - name: backend
          image: amif-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: amif-secrets
                  key: database-url
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: amif-secrets
                  key: secret-key
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: amif-backend
  namespace: amif-prod
spec:
  selector:
    app: amif-backend
  ports:
    - port: 80
      targetPort: 8000
